<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tap Tempo Game</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="nav-header">
        <h1>Tap Tempo Game</h1>
        <div class="nav-right">
            <p id="user-display" class="user-display">Player: Loading...</p>
            <button id="change-name-btn" class="nav-button">Change Name</button>
        </div>
    </div>
    <div class="container">
        <p>Choose a track and tap along to the beat!</p>
        <div id="track-list"></div>
    </div>

    <div id="name-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Change Player Name</h2>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <input type="text" id="new-name-input" placeholder="Enter new name" class="name-input">
            </div>
            <div class="modal-footer">
                <button id="cancel-btn" class="modal-button cancel">Cancel</button>
                <button id="confirm-btn" class="modal-button confirm">Confirm</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
