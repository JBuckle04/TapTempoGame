<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing - Tap Tempo Game</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1 id="track-title">Track Title</h1>
        <div id="game-area">
            <button id="tap-button">TAP</button>
            <div id="score-display">Score: 0</div>
            <p id="instructions">Complete the song to submit your score!</p>
            <button id="play-button">Play Track</button>
            <button id="stop-button" disabled>Pause</button>
        </div>
        <div id="results" style="display: none;">
            <h2>Your Score</h2>
            <p id="final-score"></p>
            <div id="leaderboard-display"></div>
            <button id="back-button">Back to Tracks</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
